<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Story Structure for Kids</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>📖 Story Structure</h1>
  <div id="stars-display" aria-live="polite" aria-label="Total stars earned">
    ⭐ <span id="total-stars">0</span>
  </div>
</header>

<main id="app" aria-live="polite">
  <!-- screens injected by app.js -->
</main>

<!-- Confetti canvas (pointer-events: none so it never blocks clicks) -->
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<!-- Single audio element — src swapped by audio.js -->
<audio id="audio-player" aria-hidden="true"></audio>

<!-- Data -->
<script src="data/lessons.js"></script>
<script src="data/stories.js"></script>

<!-- Modules (order matters: dependencies before dependents) -->
<script src="js/audio.js"></script>
<script src="js/progress.js"></script>
<script src="js/render.js"></script>
<script src="js/dragdrop.js"></script>
<script src="js/quiz.js"></script>
<script src="js/app.js"></script>

</body>
</html>
